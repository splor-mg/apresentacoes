# ETL

E o contexto da AID/SPLOR

Note:

- Lembrar de logar bitwarden AID para mostrar relatório operacional.
- [Baseado em apresentação ETL anterior](20260109_etl.html).
- [Arroz com feijão previsto nas nossas competências (**Art 36 do Decreto nº 48.636, de 19/06/2023**)](https://www.almg.gov.br/legislacao-mineira/texto/DEC/48636/2023/#:~:text=processos%20da%20Subsecretaria.-,Art.%2036,-%E2%80%93%20A%20Assessoria%20de):
  - Propor a arquitetura de dados analíticos que garanta a qualidade e a disponibilidade das informações necessárias aos processos de tomada de decisão da SPLOR.
  - Planejar o modelo de dados de suporte aos processos de inteligência analítica.
- Notas dos slides contém links para consultas.

## O que é ETL?

👉 ETL é o caminho que o dado percorre até se tornar informação útil.

Note:

- **O obvio precisa ser dito**.
- Integrar dados de diferentes fontes para aprimorar a **tomada de decisão**.
- Um processo mecânico.
- Não envolve análise de dados.
- Uma sigla, um [acrónimo](https://pt.wikipedia.org/wiki/Acr%C3%B3nimo):
  - **Extract (Extrair)**: Coletar dados das fontes.
  - **Transform (Transformar)**: Tratar, padronizar e enriquecer os dados.
  - **Load (Carregar)**: Armazenar os dados prontos em um destino final (análise de dados e tomada de decisão).

<!--v-->

## O que é ETL?

Por que ETL é necessário?

Note:

- Dados quase sempre estão espalhados em múltiplas fontes.
- Dados nascem para um contexto **operacional**, não analítico ([OLTP x OLAP](https://stackoverflow.com/questions/21900185/what-are-oltp-and-olap-and-what-is-the-difference-between-them)):
  - OLTP: On-line Transaction Processing.
  - OLAP: On-line Analytical Processing.
- Tempo excessivo gasto "arrumando dados" manualmente fazendo cada nova análise vira um retrabalho.
- Relatórios que não batem entre si.

<!--v-->

## O que é ETL?

Experimento mental

- Se uma informação só existe com a pessoa que a gerou, e essa pessoa não está disponível, essa informação realmente existe?

- Parafraseando [@mtholder](https://twitter.com/kcranstn/status/370914072511791104?s=20), você, de 6 meses atrás, não está mais disponível.

Note:
- Quais problemas enfrentamos sem processos de ETL?
- [Experimento mental feito por Francisco CODA 2021](https://www.youtube.com/watch?v=JUW60w1jDdM&t=1346s).
- Dificuldade para reproduzir análises (falta de documentação).
- Decisões baseadas em dados incompletos ou incorretos.

## Extract

Tirar os dados de onde eles vivem.

Note:

- Acessar as fontes corretas.
- Extrair os dados necessários.
- Os dados são lidos, não alterados.
- Garantir que a extração seja confiável e repetível.

<!--v-->

## Extract

💡 Em ambientes reais, raramente existe uma única fonte.

Note:

- Bancos de dados relacionais (PostgreSQL, Oracle, MySQL).
- Planilhas (Excel, CSV).
- APIs (sistemas externos, serviços web).
- Arquivos de texto ou logs.
- SISOR, SIAFI, SIAD, Excel, CSV.

<!--v-->

## Extract

O que NÃO é responsabilidade do Extract?

Note:

- Corrigir erros de dados (Transform).
- Padronizar formatos (Transform).
- Criar métricas (Transform).
- Regras de negócio complexas (Transform).

<!--v-->

## Extract

💡 Se a extração falhar, todo o ETL falha.

Note:

- A qualidade do ETL começa no Extract.

## Extract

Contexto atual SPLOR

- Target `make extract` chama comando `extract` existente no arquivo `main.py` (CLI).
- Comando `extract` chama o script `extract_resource` no arquivo `scripts.extract`, que chama o script R `scripts/extract.R`.

<!--v-->

## Extract

Contexto atual SPLOR

```bash
# clona repositório
git clone git@github.com:splor-mg/dados-armazem-siafi-2026.git
cd dados-armazem-siafi-2026

# Acessa docker para rodar o comando de extração
docker run -it --rm --mount type=bind,source=$PWD,target=/project splormg/dados-armazem-siafi-2026 bash
make extract

# Sai do container
exit

# Verifica modificação dos arquivos extraídos
git status
```

Note:

- Rodar no [GitHub Actions](https://github.com/splor-mg/dados-armazem-siafi-2026/actions/workflows/all.yaml).

## Datapackages

> The Data Package Standard offers a structured and versatile framework for organizing, documenting, and distributing data.

Note:

- Todo processo de ETL da SPLOR está baseado na utilização [do padrão Datapackage](https://datapackage.org/overview/introduction/).
- Parafraseando [@mtholder](https://twitter.com/kcranstn/status/370914072511791104?s=20), **você, de 6 meses atrás, não está mais disponível**.
- Forma de documentar (metadados) nossos dados.
- Princípios:
  - Simplicidade.
  - Flexibilidade.
  - Reprodutibilidade.
  - Interoperabilidade.
- Na prática, é um conjunto de arquivos de texto onde descrevemos as características de nossos dados.
  - [Yaml](https://learnxinyminutes.com/yaml/).
  - [Json](https://learnxinyminutes.com/json/).
- Principal vantagem: Ninguém vai mudar o nome das colunas do excel que você criou!

<!--v-->

Dados tabulares (linhas e colunas).

![normalized_table](https://github.com/user-attachments/assets/2ef8bfd7-a364-4318-a698-a134a3ae67cd)

## Datapackages

Estrutura modular dividida entre:

- Table Schema.
- Data Resource.
- Data Package.

<!--v-->

## Datapackages

Table Schema

```
# dados-armazem-siafi/schemas/cota.yaml
fields:
  - name: Ano de Exercício
    type: integer
    target: ano
  - name: Poder Unid Orçamentária - Código
    type: integer
    target: poder_cod
  - name: Unidade Orçamentária - Código
    type: integer
    target: uo_cod
```

Note:

- [Table Schema documentation](https://datapackage.org/standard/table-schema/).
- [Exemplo completo](https://github.com/splor-mg/dados-armazem-siafi-2025/blob/main/schemas/cota.yaml).
- Nome dos seus campos.
- Tipos de dados dos seus campos.

<!--v-->

## Datapackages

Table Resource

```
# dados-armazem-siafi/datapackage.yaml
resource:
  - name: cota
    type: table
    path: ["data-raw/cota-item-data.csv"]
    scheme: file
    format: csv
    mediatype: text/csv
    encoding: utf-8
    dialect: dialect.yaml
    schema: schemas/cota.yaml
```

Note:

- [Table Resource documentation](https://datapackage.org/standard/data-resource/).
- [Exemplo completo](https://github.com/splor-mg/dados-armazem-siafi-2025/blob/main/datapackage.yaml).
- Informações sobre meu arquivo.

<!--v-->

## Datapackages

resources:

    path: ["data-raw/cota-item-data.csv"]
    scheme: file
    format: csv
    mediatype: text/csv
    encoding: utf-8
    dialect: dialect.yaml

    path: ["data-raw/execucao-siafi-01.csv"]
    scheme: file
    format: csv
    mediatype: text/csv
    encoding: utf-8
    dialect: dialect.yaml
    schema: schemas/execucao.yaml
```
