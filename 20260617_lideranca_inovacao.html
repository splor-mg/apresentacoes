# Liderança e Inovação

Qual papel da AID?

<!--s-->

## Por quero compartilhar isso?

- Ideias soltas sobre inovação e liderança.
- Como podemos estruturar melhor nosso trabalho.

Note:

- Reflexões, não decisões.
- Provocações para discutirmos juntos.
- Impacto de nosso trabalho.

<!--s-->

## Inovação

<!--v-->

## Fazer as perguntas certas

> A qualidade das respostas depende da qualidade das perguntas.

Note:

- Estamos atacando os nossos reais problemas.
- Investigar melhor.
- Fazer muito bem o que não precisa ser feito.
- Burocracia eficiente.
- **Propostas**:
    - Toró de ideias.
    - Novas tecnologias.
    - Carteira de Inovações.

<!--v-->

## Pessoas talentosas precisam de autonomia

> "Contrate pessoas talentosas e as deixe trabalhar."

Note:

- Cultura da Netflix.
- Papel da liderança é remover obstáculos.
- Autonomia gera responsabilidade.
- Mas como medir a efetividade do nosso trabalho?
- **Propostas**:
    - O que erramos essa semana?
    - Faz um resumo para mim?
    - Efetividade em números.

<!--v-->

## Pessoas de dentro + pessoas de fora

- Inovação costuma surgir do encontro de dois mundos.

Note:

- Visões externas desafiam nossas certezas.
- Benchmarking.
- Eventos, comunidades e trocas com outras equipes.
- **Propostas**:
    - Cronograma de eventos.
    - Eventos automatiza.
    - Procura ativa de equipes como a nossa.

<!--v-->

## Inovação não é tecnologia

Ferramentas como IA são apenas meios.

Note:

- Inovação é resolver problemas reais de maneira simples.
- MVP.
- Aprender rápido.
- Ajustar o rumo.

<!--v-->

## Precisamos fortalecer o básico

Arroz com Feijão

Note:

- **Proposta**:
    - Não esquecer da rotina.
    - Processo de inovação.
    - Coleta estruturada de problemas.
    - Catalogação de oportunidades.
    - Priorização.
    - Acompanhamento.
    - Discussão constante.

<!--s-->

## Resolver problemas de outras equipes

- Talvez nosso maior impacto não esteja apenas dentro da AID.

Note:

- Galinha que não canta, vira canja.
- Como podemos ajudar outras áreas?
- Como escalar nossas soluções?
- Como compartilhar conhecimento?

<!--s-->

## AID como plataforma de transformação


- Compartilhamento de nosso trabalho de forma sistematizada.

Note:

- Inteligência de dados x Inovação
- Projetos que ultrapassem os limites da equipe.
- Impacto institucional.
- Portfólio de melhorias de processos.
- Automações reutilizáveis.
- ETLs e produtos de dados.
- Trilha de capacitação.
- Docs as Code e open source.
- Uso estratégico de IA.

- Proposta:
    - Resultados alcançados (em números).
    - Novas tecnologias.
    - Erros e aprendizados.
    - Projetos em andamento.
