## _git_ .vs _Github_

|__Git__ | __GitHub__|
| -------------------- | --------------------- |
| - Guarda as versões | - Guarda os projetos na nuvem |
| - Funciona no seu computador | - Funciona pela internet |
| - É a tecnologia | - É a plataforma que usa o Git |

*_Você vai usar os dois juntos: Git para registrar, GitHub para compartilhar._*

<!--s-->

## Transformação

_Usar essas ferramentas transformou a completamente a forma como eu trabalho._

- Maior segurança para realizar testes e me arriscar.
- Facilidade de compartilhar de informações.
- Gerenciamento de tarefas e projetos.
- Comunicação quase que exclusiva na plataforma do **Github**
