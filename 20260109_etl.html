# ETL

Exemplos AID/SPLOR

<!--s-->

## O que é ETL?

👉 ETL é o caminho que o dado percorre até se tornar informação útil.

Note:

- Integrar dados de diferentes fontes para aprimorar a **tomada de decisão**.

<!--v-->

## O que é ETL?

- **Extract (Extrair)**: Coletar dados das fontes.
- **Transform (Transformar)**: Tratar, padronizar e enriquecer os dados.
- **Load (Carregar)**: Armazenar os dados prontos em um destino final.

<!--v-->

## O que é ETL?

Por que ETL é necessário?

Note:

- Os dados não nascem prontos para análise.
- Estão em múltiplos sistemas/planilhas/fontes.
- Com formatos (nomes) diferentes.
- Pensados para uso **operacional**, não analítico ([OLTP x OLAP](https://stackoverflow.com/questions/21900185/what-are-oltp-and-olap-and-what-is-the-difference-between-them)).

<!--v-->

## O que é ETL?

Quais problemas enfrentamos sem processos de ETL?

Note:

- Cada nova análise vira um retrabalho.
- Relatórios que não batem entre si.
- Tempo excessivo gasto "arrumando dados" manualmente.
- Dificuldade para reproduzir análises (falta de documentação).
- Decisões baseadas em dados incompletos ou incorretos

<!--v-->

## O que é ETL?

Contexto SPLOR:

- **Extract (Extrair)**: Coletar dados SISOR, SIAFI, SIAD.
- **Transform (Transformar)**: Padronizar nome de campos (UO - Unidade orçamentária)

Note:

## Extract

Tirar os dados de onde eles vivem.

Note:

- Acessar as fontes corretas.
- Extrair os dados necessários.
- Os dados são lidos, não alterados.
- Garantir que a extração seja confiável e repetível.

<!--v-->

## Extract

💡 Em ambientes reais, raramente existe uma única fonte.

Note:

- Bancos de dados relacionais (PostgreSQL, Oracle, MySQL).
- Planilhas (Excel, CSV).
- APIs (sistemas externos, serviços web).
- Arquivos de texto ou logs.
- SISOR, SIAFI, SIAD, Excel, CSV.

<!--v-->

## Extract

O que NÃO é responsabilidade do Extract?

Note:

- Corrigir erros de dados (Transform).
- Padronizar formatos (Transform).
- Criar métricas (Transform).
- Regras de negócio complexas (Transform).

<!--v-->

## Extract

💡 Se a extração falhar, todo o ETL falha.

Note:

- A qualidade do ETL começa no Extract.

<!--v-->

## Extract

Contexto SPLOR:

- Target `make extract` chama comando `extract` existente no arquivo `main.py` (CLI).
- Comando `extract` chama o script `extract_resource` no arquivo `scripts.extract`.
- Script `extract_resource` chama o script do arquivo `scripts/extract.R` (R).

<!--v-->

## Extract

Contexto SPLOR:

![mão na massa](https://images.pexels.com/photos/3218467/pexels-photo-3218467.jpeg)

<!--v-->

## Extract

Contexto SPLOR:

```bash
# clona repositório
git clone git@github.com:splor-mg/dados-armazem-siafi-2025.git
cd dados-armazem-siafi-2025

# Acessa docker para rodar o comando de extração
docker run -it --rm --mount type=bind,source=$PWD,target=/project splormg/dados-armazem-siafi-2025 bash
make extract

# Sai do container
exit

# Verifica modificação dos arquivos extraídos
git status
```

Note:

- Instalar Docker.
- Necessário cadastrar credenciais gmail.
